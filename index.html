<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF Редактор</title>
    <!-- Подключаем профессиональную библиотеку gif.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <style>
        /* Основной мистический/космический стиль */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Jost:wght@300;400;500&display=swap');

        body {
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            background: #0f0518;
            background-image: radial-gradient(circle at 10% 20%, rgba(67, 24, 107, 0.4) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(93, 31, 148, 0.3) 0%, transparent 40%);
            color: #e0d5ed;
            font-family: 'Jost', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
        }

        .app-container {
            width: 100%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
            padding: 25px;
            background: rgba(32, 14, 55, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(138, 75, 206, 0.3);
            box-shadow: 0 0 40px rgba(67, 24, 107, 0.6);
            margin: auto;
        }

        h1 {
            grid-column: 1 / -1;
            text-align: center;
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(183, 102, 255, 0.8);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .left-panel { display: flex; flex-direction: column; gap: 15px; }
        .panel-box { background: rgba(20, 8, 38, 0.7); padding: 15px; border-radius: 15px; border: 1px solid rgba(138, 75, 206, 0.2); }
        .upload-wrapper { display: flex; align-items: center; gap: 15px; }

        .btn-upload {
            background: linear-gradient(135deg, #a64dff, #6b21a8);
            color: #fff;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(166, 77, 255, 0.4);
            transition: 0.3s;
            display: inline-block;
        }
        .btn-upload:hover { box-shadow: 0 0 25px rgba(166, 77, 255, 0.8); transform: scale(1.05); }
        input[type="file"] { display: none; }
        
        #checkIcon { color: #4ade80; font-size: 20px; opacity: 0; transform: scale(0); transition: 0.3s; }
        #checkIcon.visible { opacity: 1; transform: scale(1); }

        .slider-container label { display: block; margin-bottom: 8px; font-size: 14px; color: #cba4f0; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: rgba(138, 75, 206, 0.3); border-radius: 5px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #d8b4fe; box-shadow: 0 0 10px #d8b4fe; cursor: pointer; }

        .right-panel { display: flex; flex-direction: column; gap: 15px; }

        .preview-box {
            position: relative;
            background: #000;
            border-radius: 15px;
            border: 2px solid rgba(183, 102, 255, 0.5);
            box-shadow: inset 0 0 30px rgba(183, 102, 255, 0.2), 0 0 20px rgba(183, 102, 255, 0.1);
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: linear-gradient(45deg, #1a0b2e 25%, transparent 25%), linear-gradient(-45deg, #1a0b2e 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #1a0b2e 75%), linear-gradient(-45deg, transparent 75%, #1a0b2e 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        #liveCanvas { max-width: 100%; max-height: 100%; z-index: 2; position: absolute; }
        #finalGif { max-width: 100%; max-height: 100%; z-index: 3; position: absolute; display: none; transition: box-shadow 0.4s ease; border-radius: 8px; }
        .empty-text { position: absolute; color: rgba(203, 164, 240, 0.5); z-index: 1; font-style: italic; font-size: 14px;}

        .options-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px; 
        }
        .btn-option { 
            background: rgba(138, 75, 206, 0.1); 
            border: 1px solid rgba(138, 75, 206, 0.4); 
            color: #d8b4fe; 
            padding: 8px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-family: inherit; 
            font-size: 12px; 
            transition: 0.3s; 
            text-align: center; 
        }
        .btn-option:hover { background: rgba(138, 75, 206, 0.3); }
        .btn-option.active { background: rgba(183, 102, 255, 0.5); border-color: #d8b4fe; box-shadow: 0 0 10px rgba(183, 102, 255, 0.5); color: #fff;}

        .dropdown-wrapper { position: relative; }
        .dropdown-content {
            display: none; 
            position: absolute; 
            bottom: 100%; 
            left: 0; 
            width: 100%;
            background: rgba(32, 14, 55, 0.95); 
            border: 1px solid rgba(138, 75, 206, 0.5);
            border-radius: 8px; 
            z-index: 10; 
            margin-bottom: 5px; 
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5); 
            max-height: 120px; 
            overflow-y: auto; 
        }
        
        .dropdown-content::-webkit-scrollbar { width: 6px; }
        .dropdown-content::-webkit-scrollbar-track { background: rgba(20, 8, 38, 0.7); border-radius: 8px; }
        .dropdown-content::-webkit-scrollbar-thumb { background: #d8b4fe; border-radius: 8px; }
        .dropdown-content::-webkit-scrollbar-thumb:hover { background: #a64dff; }

        .dropdown-content.show { display: block; }
        .dropdown-content div { padding: 8px; color: #d8b4fe; cursor: pointer; font-size: 12px; text-align: center; border-bottom: 1px solid rgba(138, 75, 206, 0.2); transition: 0.2s; }
        .dropdown-content div:hover { background: rgba(183, 102, 255, 0.4); color: #fff; }
        .dropdown-content div:last-child { border-bottom: none; }

        .btn-main { background: linear-gradient(90deg, #d946ef, #8b5cf6); border: none; color: white; padding: 12px; font-size: 14px; border-radius: 10px; cursor: pointer; text-transform: uppercase; font-weight: bold; box-shadow: 0 0 20px rgba(217, 70, 239, 0.4); transition: 0.3s; margin-top: 5px; }
        .btn-main:hover { filter: brightness(1.2); box-shadow: 0 0 30px rgba(217, 70, 239, 0.7); }
        .btn-main:disabled { background: #4b365e; color: #888; cursor: not-allowed; box-shadow: none; }

        .btn-download { background: #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); display: none; }
        .btn-download:hover { background: #059669; box-shadow: 0 0 30px rgba(16, 185, 129, 0.7); }

        #processStatus { text-align: center; color: #fbbf24; font-size: 13px; min-height: 15px; margin: 5px 0 0; }
        #hiddenVideo { display: none; }

        @media(max-width: 768px) { .app-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="app-container">
    <h1>GIF Редактор</h1>

    <div class="left-panel">
        <div class="panel-box">
            <div class="upload-wrapper">
                <label for="videoInput" class="btn-upload">Загрузить видео</label>
                <input type="file" id="videoInput" accept="video/mp4,video/webm,video/mov">
                <span id="checkIcon">✅</span>
            </div>
            <p style="font-size: 11px; color: #9c80b6; margin-top: 10px; margin-bottom: 0;">* Рекомендуется до 5-7 секунд на однородном фоне.</p>
        </div>

        <div class="panel-box">
            <div class="slider-container">
                <label>Сила удаления фона: <span id="tolValue">45</span></label>
                <input type="range" id="tolerance" min="10" max="150" value="45">
            </div>
        </div>
    </div>

    <div class="right-panel">
        <div class="preview-box">
            <span class="empty-text" id="emptyText">Предпросмотр...</span>
            <canvas id="liveCanvas"></canvas>
            <img id="finalGif" alt="Готовый GIF">
        </div>

        <div class="options-grid">
            <button class="btn-option active" id="optConvert">Конвертировать видео в гиф</button>
            
            <div class="dropdown-wrapper">
                <button class="btn-option" id="resolutionBtn" style="width: 100%;">Разрешение: 720p ▲</button>
                <div class="dropdown-content" id="resolutionDropdown">
                    <div data-val="300" data-label="720p">720p (Оптимально)</div>
                    <div data-val="450" data-label="1080p">1080p (Высокое)</div>
                    <div data-val="600" data-label="2K">2K (Ультра)</div>
                    <div data-val="800" data-label="4K">4K (Тяжелое)</div>
                    <div data-val="1000" data-label="8K">8K (Максимум)</div>
                </div>
            </div>

            <div class="dropdown-wrapper">
                <button class="btn-option" id="compressionBtn" style="width: 100%;">Сжатие: Без сжатия ▲</button>
                <div class="dropdown-content" id="compressionDropdown">
                    <div data-val="0" data-label="Без сжатия">Без сжатия (Высокое качество)</div>
                    <div data-val="10" data-label="До 10 МБ">До 10 МБ (Умеренное сжатие)</div>
                    <div data-val="5" data-label="До 5 МБ">До 5 МБ (Сильное сжатие)</div>
                </div>
            </div>
        </div>

        <div id="processStatus"></div>

        <button class="btn-main" id="btnProcess">Обработать и создать гиф</button>
        <button class="btn-main btn-download" id="btnDownload">СКАЧАТЬ GIF</button>
    </div>
</div>

<video id="hiddenVideo" muted playsinline loop></video>
<canvas id="processCanvas" style="display:none;"></canvas>

<script>
    const videoInput = document.getElementById('videoInput');
    const checkIcon = document.getElementById('checkIcon');
    const toleranceSlider = document.getElementById('tolerance');
    const tolValue = document.getElementById('tolValue');
    
    const hiddenVideo = document.getElementById('hiddenVideo');
    const liveCanvas = document.getElementById('liveCanvas');
    const liveCtx = liveCanvas.getContext('2d', { willReadFrequently: true });
    const finalGif = document.getElementById('finalGif');
    const emptyText = document.getElementById('emptyText');
    
    const btnProcess = document.getElementById('btnProcess');
    const btnDownload = document.getElementById('btnDownload');
    const processStatus = document.getElementById('processStatus');
    const optConvert = document.getElementById('optConvert');

    optConvert.addEventListener('click', () => optConvert.classList.toggle('active'));

    const resolutionBtn = document.getElementById('resolutionBtn');
    const resolutionDropdown = document.getElementById('resolutionDropdown');
    const resolutionOptions = resolutionDropdown.querySelectorAll('div');
    let selectedQualityWidth = 300; 

    resolutionBtn.addEventListener('click', (event) => {
        event.stopPropagation();
        resolutionDropdown.classList.toggle('show');
        compressionDropdown.classList.remove('show');
    });
    resolutionOptions.forEach(option => {
        option.addEventListener('click', (e) => {
            selectedQualityWidth = parseInt(e.target.getAttribute('data-val'));
            const label = e.target.getAttribute('data-label');
            resolutionBtn.innerText = `Разрешение: ${label} ▲`;
            resolutionDropdown.classList.remove('show');
        });
    });

    const compressionBtn = document.getElementById('compressionBtn');
    const compressionDropdown = document.getElementById('compressionDropdown');
    const compressionOptions = compressionDropdown.querySelectorAll('div');
    let selectedCompressionTarget = 0; 

    compressionBtn.addEventListener('click', (event) => {
        event.stopPropagation();
        compressionDropdown.classList.toggle('show');
        resolutionDropdown.classList.remove('show');
    });
    compressionOptions.forEach(option => {
        option.addEventListener('click', (e) => {
            selectedCompressionTarget = parseInt(e.target.getAttribute('data-val'));
            const label = e.target.getAttribute('data-label');
            compressionBtn.innerText = `Сжатие: ${label} ▲`;
            compressionDropdown.classList.remove('show');
        });
    });

    window.addEventListener('click', (e) => {
        if (!resolutionBtn.contains(e.target) && !resolutionDropdown.contains(e.target)) {
            resolutionDropdown.classList.remove('show');
        }
        if (!compressionBtn.contains(e.target) && !compressionDropdown.contains(e.target)) {
            compressionDropdown.classList.remove('show');
        }
    });

    let currentGifUrl = '';
    let isProcessing = false;

    let toleranceSq = 45 * 45; 
    toleranceSlider.addEventListener('input', (e) => {
        tolValue.innerText = e.target.value;
        toleranceSq = e.target.value * e.target.value; 
    });

    videoInput.addEventListener('change', (e) => {
        if (!e.target.files.length) return;
        
        const file = e.target.files[0];
        checkIcon.classList.add('visible');
        emptyText.style.display = 'none';
        finalGif.style.display = 'none';
        liveCanvas.style.display = 'block';
        btnDownload.style.display = 'none';
        btnProcess.style.display = 'block';
        processStatus.innerText = '';
        
        hiddenVideo.src = URL.createObjectURL(file);
        
        hiddenVideo.onloadedmetadata = () => {
            liveCanvas.width = hiddenVideo.videoWidth;
            liveCanvas.height = hiddenVideo.videoHeight;
            hiddenVideo.play();
            renderLivePreview(); 
        };
    });

    function renderLivePreview() {
        if (isProcessing) return; 
        if (!hiddenVideo.paused && !hiddenVideo.ended) {
            liveCtx.clearRect(0, 0, liveCanvas.width, liveCanvas.height);
            liveCtx.drawImage(hiddenVideo, 0, 0, liveCanvas.width, liveCanvas.height);
            let frame = liveCtx.getImageData(0, 0, liveCanvas.width, liveCanvas.height);
            
            let data = frame.data;
            let bgR = data[0], bgG = data[1], bgB = data[2];

            for (let j = 0; j < data.length; j += 4) {
                let r = data[j], g = data[j+1], b = data[j+2];
                let diffSq = (r - bgR)*(r - bgR) + (g - bgG)*(g - bgG) + (b - bgB)*(b - bgB);
                if (diffSq < toleranceSq) {
                    data[j+3] = 0; 
                }
            }
            liveCtx.putImageData(frame, 0, 0);
        }
        requestAnimationFrame(renderLivePreview);
    }

    btnProcess.addEventListener('click', async () => {
        if (!videoInput.files.length) return alert('Сначала загрузите видео!');
        
        isProcessing = true;
        btnProcess.disabled = true;
        hiddenVideo.pause(); 
        liveCanvas.style.display = 'none';
        emptyText.style.display = 'inline';
        emptyText.innerText = 'Подготовка магии...';
        
        let gifQuality = 10; 
        let gifFps = 15;     
        let maxSeconds = 7;  

        if (selectedQualityWidth >= 450) { gifFps = 12; }
        if (selectedQualityWidth >= 600) { gifFps = 8; maxSeconds = 6; }
        if (selectedQualityWidth >= 800) { gifFps = 6; maxSeconds = 5; }
        if (selectedQualityWidth >= 1000) { gifFps = 4; maxSeconds = 4; } 

        if (selectedCompressionTarget === 10) { 
            gifQuality = 25; 
            if (gifFps > 5) gifFps -= 3; 
        } else if (selectedCompressionTarget === 5) { 
            gifQuality = 40; 
            if (gifFps > 4) gifFps -= 5; 
        }
        if (gifFps < 4) gifFps = 4; 

        let targetDelayMs = 1000 / gifFps; 
        let gifDelayMs = Math.round(targetDelayMs / 10) * 10; 
        let timeStep = gifDelayMs / 1000; 

        let width = hiddenVideo.videoWidth;
        let height = hiddenVideo.videoHeight;
        
        if (width > selectedQualityWidth) {
            height = Math.floor(height * (selectedQualityWidth / width));
            width = selectedQualityWidth;
        }

        const processCanvas = document.getElementById('processCanvas');
        const pCtx = processCanvas.getContext('2d', { willReadFrequently: true });
        processCanvas.width = width;
        processCanvas.height = height;

        const duration = hiddenVideo.duration;
        const actualDuration = (duration > maxSeconds ? maxSeconds : duration);
        const totalFrames = Math.floor(actualDuration / timeStep); 

        const workerBlob = new Blob([`importScripts('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');`], { type: 'application/javascript' });
        const workerUrl = URL.createObjectURL(workerBlob);

        const gif = new GIF({
            workers: 2,
            quality: gifQuality, 
            width: width,
            height: height,
            workerScript: workerUrl,
            transparent: 0xFF00FF 
        });

        processStatus.innerText = `Анализ пространства (0 / ${totalFrames})...`;

        for (let i = 0; i < totalFrames; i++) { 
            const time = i * timeStep; 
            await seekVideo(hiddenVideo, time);
            
            pCtx.drawImage(hiddenVideo, 0, 0, width, height);
            let frameData = pCtx.getImageData(0, 0, width, height);
            let data = frameData.data;
            
            let bgR = data[0], bgG = data[1], bgB = data[2];

            for (let j = 0; j < data.length; j += 4) {
                let r = data[j], g = data[j+1], b = data[j+2];
                let diffSq = (r - bgR)*(r - bgR) + (g - bgG)*(g - bgG) + (b - bgB)*(b - bgB);
                if (diffSq < toleranceSq) {
                    data[j] = 255;   
                    data[j+1] = 0;   
                    data[j+2] = 255; 
                    data[j+3] = 255; 
                }
            }
            pCtx.putImageData(frameData, 0, 0);
            
            gif.addFrame(pCtx, {copy: true, delay: gifDelayMs}); 
            processStatus.innerText = `Анализ пространства (${i + 1} / ${totalFrames})...`;
        }

        gif.on('progress', function(p) {
            processStatus.innerText = 'Сборка артефакта: ' + Math.round(p * 100) + '%...';
        });

        gif.on('finished', function(blob) {
            currentGifUrl = URL.createObjectURL(blob);
            
            emptyText.style.display = 'none';
            finalGif.src = currentGifUrl;
            finalGif.style.display = 'block';
            
            btnProcess.style.display = 'none';
            btnDownload.style.display = 'block';
            
            let mbSize = (blob.size / (1024 * 1024)); 
            
            let statusText = `Готово! Вес: ~${mbSize.toFixed(1)} МБ.`;
            let statusColor = '#4ade80';

            if (selectedCompressionTarget > 0 && mbSize > selectedCompressionTarget) {
                statusText += `<br>⚠️ Не удалось уложиться в ${selectedCompressionTarget} МБ. Текущий вес ${mbSize.toFixed(1)} МБ.`;
                statusColor = '#fbbf24'; 
            }

            processStatus.innerHTML = statusText; 
            processStatus.style.color = statusColor;
            
            btnProcess.disabled = false;
            isProcessing = false;
            
            // Возобновляем предпросмотр если пользователь захочет загрузить новое видео
            hiddenVideo.play();
            renderLivePreview();
        });

        gif.render();
    });

    // ИСПРАВЛЕННАЯ ФУНКЦИЯ ПЕРЕМОТКИ ВИДЕО
    function seekVideo(video, time) {
        return new Promise((resolve) => {
            // Если время уже совпадает (например на 0 секунде), событие seeked может не сработать
            if (Math.abs(video.currentTime - time) < 0.001) {
                setTimeout(resolve, 20); // Даем микро-паузу на обновление канваса
                return;
            }

            let isResolved = false;

            const onSeeked = () => {
                if(isResolved) return;
                isResolved = true;
                video.removeEventListener('seeked', onSeeked);
                
                // Используем setTimeout. Метод requestVideoFrameCallback 
                // НЕ РАБОТАЕТ, когда видео поставлено на паузу!
                setTimeout(resolve, 20); 
            };

            video.addEventListener('seeked', onSeeked);
            video.currentTime = time;

            // Предохранитель (fallback): если браузер заглючил и не отдал событие seeked
            setTimeout(() => {
                if(!isResolved) {
                    isResolved = true;
                    video.removeEventListener('seeked', onSeeked);
                    resolve();
                }
            }, 500); 
        });
    }

    btnDownload.addEventListener('click', () => {
        const link = document.createElement('a');
        link.href = currentGifUrl;
        link.download = 'transparent_magic.gif';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        processStatus.innerHTML = '⚠️ Genially блокирует авто-скачивание.<br><b>НАЖМИТЕ ПРАВОЙ КНОПКОЙ МЫШИ</b> на гифку выше и выберите <b>"Сохранить картинку как..."</b>, либо перетащите её мышкой на слайд!';
        processStatus.style.color = '#fbbf24'; 
        processStatus.style.lineHeight = '1.4';
        processStatus.style.marginTop = '10px';
        
        finalGif.style.boxShadow = '0 0 30px #4ade80, 0 0 50px #4ade80';
        setTimeout(() => {
            finalGif.style.boxShadow = 'none';
        }, 2500);
    });

</script>

</body>
</html>
