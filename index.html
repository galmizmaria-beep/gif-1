<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIF Редактор</title>
    <!-- Подключаем профессиональную библиотеку gif.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
    <style>
        /* Основной мистический/космический стиль */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Jost:wght@300;400;500&display=swap');

        /* Жесткая фиксация в размер экрана/iframe 16:9 */
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* Запрещаем любую прокрутку страницы */
            background: #0f0518;
            background-image: radial-gradient(circle at 10% 20%, rgba(67, 24, 107, 0.4) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(93, 31, 148, 0.3) 0%, transparent 40%);
            color: #e0d5ed;
            font-family: 'Jost', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            width: 96%;
            height: 94vh; /* Занимает почти всю высоту окна */
            max-width: 1200px; /* Позволяем растягиваться шире под 16:9 */
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px; /* Уменьшили расстояние */
            padding: 20px 30px; /* Уменьшили внутренние отступы */
            background: rgba(32, 14, 55, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(138, 75, 206, 0.3);
            box-shadow: 0 0 40px rgba(67, 24, 107, 0.6);
            box-sizing: border-box;
        }

        h1 {
            grid-column: 1 / -1;
            text-align: center;
            font-family: 'Cinzel', serif;
            font-size: 2rem; /* Чуть меньше заголовок */
            margin: 0 0 10px 0;
            text-shadow: 0 0 15px rgba(183, 102, 255, 0.8);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .left-panel { display: flex; flex-direction: column; gap: 15px; }
        .panel-box { background: rgba(20, 8, 38, 0.7); padding: 20px; border-radius: 15px; border: 1px solid rgba(138, 75, 206, 0.2); }
        .upload-wrapper { display: flex; align-items: center; gap: 15px; }

        .btn-upload {
            background: linear-gradient(135deg, #a64dff, #6b21a8);
            color: #fff;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(166, 77, 255, 0.4);
            transition: 0.3s;
            display: inline-block;
        }
        .btn-upload:hover { box-shadow: 0 0 25px rgba(166, 77, 255, 0.8); transform: scale(1.05); }
        input[type="file"] { display: none; }
        
        #checkIcon { color: #4ade80; font-size: 24px; opacity: 0; transform: scale(0); transition: 0.3s; }
        #checkIcon.visible { opacity: 1; transform: scale(1); }

        .slider-container label { display: block; margin-bottom: 8px; font-size: 14px; color: #cba4f0; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; background: rgba(138, 75, 206, 0.3); border-radius: 5px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #d8b4fe; box-shadow: 0 0 10px #d8b4fe; cursor: pointer; }

        .right-panel { display: flex; flex-direction: column; gap: 12px; justify-content: space-between; }

        .preview-box {
            position: relative;
            background: #000;
            border-radius: 15px;
            border: 2px solid rgba(183, 102, 255, 0.5);
            box-shadow: inset 0 0 30px rgba(183, 102, 255, 0.2), 0 0 20px rgba(183, 102, 255, 0.1);
            height: 220px; /* УМЕНЬШЕНО для экономии места */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-image: linear-gradient(45deg, #1a0b2e 25%, transparent 25%), linear-gradient(-45deg, #1a0b2e 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #1a0b2e 75%), linear-gradient(-45deg, transparent 75%, #1a0b2e 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        #liveCanvas { max-width: 100%; max-height: 100%; z-index: 2; position: absolute; }
        #finalGif { max-width: 100%; max-height: 100%; z-index: 3; position: absolute; display: none; }
        .empty-text { position: absolute; color: rgba(203, 164, 240, 0.5); z-index: 1; font-style: italic; }

        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .btn-option { background: rgba(138, 75, 206, 0.1); border: 1px solid rgba(138, 75, 206, 0.4); color: #d8b4fe; padding: 8px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 12px; transition: 0.3s; text-align: center; }
        .btn-option:hover { background: rgba(138, 75, 206, 0.3); }
        .btn-option.active { background: rgba(183, 102, 255, 0.5); border-color: #d8b4fe; box-shadow: 0 0 10px rgba(183, 102, 255, 0.5); color: #fff;}

        /* Стили меню качества (ОТКРЫВАЕТСЯ ВВЕРХ) */
        .dropdown-wrapper { position: relative; grid-column: 1 / -1; }
        .dropdown-content {
            display: none; position: absolute; left: 0; width: 100%;
            bottom: 100%; /* ЗАСТАВЛЯЕТ МЕНЮ ОТКРЫВАТЬСЯ ВВЕРХ */
            margin-bottom: 5px; /* Отступ от кнопки */
            background: rgba(32, 14, 55, 0.98); border: 1px solid rgba(138, 75, 206, 0.7);
            border-radius: 8px; z-index: 10; box-shadow: 0 -5px 20px rgba(0,0,0,0.6);
            max-height: 160px; overflow-y: auto; 
        }
        
        .dropdown-content::-webkit-scrollbar { width: 6px; }
        .dropdown-content::-webkit-scrollbar-track { background: rgba(20, 8, 38, 0.7); border-radius: 8px; }
        .dropdown-content::-webkit-scrollbar-thumb { background: #d8b4fe; border-radius: 8px; }
        .dropdown-content::-webkit-scrollbar-thumb:hover { background: #a64dff; }

        .dropdown-content.show { display: block; }
        .dropdown-content div { padding: 8px; color: #d8b4fe; cursor: pointer; font-size: 12px; text-align: center; border-bottom: 1px solid rgba(138, 75, 206, 0.2); transition: 0.2s; }
        .dropdown-content div:hover { background: rgba(183, 102, 255, 0.4); color: #fff; }
        .dropdown-content div:last-child { border-bottom: none; }

        .btn-main { background: linear-gradient(90deg, #d946ef, #8b5cf6); border: none; color: white; padding: 12px; font-size: 14px; border-radius: 10px; cursor: pointer; text-transform: uppercase; font-weight: bold; box-shadow: 0 0 20px rgba(217, 70, 239, 0.4); transition: 0.3s; margin-top: 5px; width: 100%; }
        .btn-main:hover { filter: brightness(1.2); box-shadow: 0 0 30px rgba(217, 70, 239, 0.7); }
        .btn-main:disabled { background: #4b365e; color: #888; cursor: not-allowed; box-shadow: none; }

        .btn-download { background: #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); display: none; }
        .btn-download:hover { background: #059669; box-shadow: 0 0 30px rgba(16, 185, 129, 0.7); }

        #processStatus { text-align: center; color: #fbbf24; font-size: 13px; min-height: 18px; }
        #hiddenVideo { display: none; }

        @media(max-width: 768px) { 
            .app-container { grid-template-columns: 1fr; height: auto; overflow-y: auto;} 
            body { overflow-y: auto; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>GIF Редактор</h1>

    <!-- Левая панель -->
    <div class="left-panel">
        <div class="panel-box">
            <div class="upload-wrapper">
                <label for="videoInput" class="btn-upload">Загрузить видео</label>
                <input type="file" id="videoInput" accept="video/mp4,video/webm,video/mov">
                <span id="checkIcon">✅</span>
            </div>
            <p style="font-size: 11px; color: #9c80b6; margin-top: 10px;">* Рекомендуется до 5-7 секунд на однородном фоне.</p>
        </div>

        <div class="panel-box">
            <div class="slider-container">
                <label>Сила удаления фона: <span id="tolValue">45</span></label>
                <input type="range" id="tolerance" min="10" max="150" value="45">
            </div>
        </div>
    </div>

    <!-- Правая панель -->
    <div class="right-panel">
        <div class="preview-box">
            <span class="empty-text" id="emptyText">Предпросмотр...</span>
            <canvas id="liveCanvas"></canvas>
            <img id="finalGif" alt="Готовый GIF">
        </div>

        <div class="options-grid">
            <button class="btn-option active" id="optConvert">Конвертировать видео в гиф</button>
            <button class="btn-option active" id="optQuality">Сжать гиф (< 5 МБ)</button>
            
            <!-- Выпадающее меню качества (ОТКРЫВАЕТСЯ ВВЕРХ) -->
            <div class="dropdown-wrapper">
                <button class="btn-option" id="qualityBtn" style="width: 100%;">Выбрать качество: 720p ▼</button>
                <div class="dropdown-content" id="qualityDropdown">
                    <div data-val="300" data-label="720p">720p (Оптимально для Genially)</div>
                    <div data-val="450" data-label="1080p">1080p (Высокое)</div>
                    <div data-val="600" data-label="2K">2K (Ультра)</div>
                    <div data-val="800" data-label="4K">4K (Тяжелое)</div>
                    <div data-val="1000" data-label="8K">8K (Максимум)</div>
                </div>
            </div>
        </div>

        <div id="processStatus"></div>

        <div>
            <button class="btn-main" id="btnProcess">Обработать и создать гиф</button>
            <button class="btn-main btn-download" id="btnDownload">СКАЧАТЬ GIF</button>
        </div>
    </div>
</div>

<!-- Скрытые элементы для расчетов -->
<video id="hiddenVideo" muted playsinline loop></video>
<canvas id="processCanvas" style="display:none;"></canvas>

<script>
    const videoInput = document.getElementById('videoInput');
    const checkIcon = document.getElementById('checkIcon');
    const toleranceSlider = document.getElementById('tolerance');
    const tolValue = document.getElementById('tolValue');
    
    const hiddenVideo = document.getElementById('hiddenVideo');
    const liveCanvas = document.getElementById('liveCanvas');
    const liveCtx = liveCanvas.getContext('2d', { willReadFrequently: true });
    const finalGif = document.getElementById('finalGif');
    const emptyText = document.getElementById('emptyText');
    
    const btnProcess = document.getElementById('btnProcess');
    const btnDownload = document.getElementById('btnDownload');
    const processStatus = document.getElementById('processStatus');
    const optQuality = document.getElementById('optQuality');
    const options = document.querySelectorAll('.btn-option:not(#qualityBtn)');
    
    // Переключение кнопок настроек
    options.forEach(btn => btn.addEventListener('click', () => btn.classList.toggle('active')));

    // Логика выпадающего списка качества
    const qualityBtn = document.getElementById('qualityBtn');
    const qualityDropdown = document.getElementById('qualityDropdown');
    const qualityOptions = qualityDropdown.querySelectorAll('div');
    let selectedQualityWidth = 300; // По умолчанию 720p

    qualityBtn.addEventListener('click', (e) => {
        e.stopPropagation(); // Чтобы не срабатывало закрытие на window
        qualityDropdown.classList.toggle('show');
        // Меняем стрелочку при открытии вверх
        if(qualityDropdown.classList.contains('show')) {
            qualityBtn.innerText = qualityBtn.innerText.replace('▼', '▲');
        } else {
            qualityBtn.innerText = qualityBtn.innerText.replace('▲', '▼');
        }
    });

    qualityOptions.forEach(option => {
        option.addEventListener('click', (e) => {
            selectedQualityWidth = parseInt(e.target.getAttribute('data-val'));
            const label = e.target.getAttribute('data-label');
            qualityBtn.innerText = `Выбрать качество: ${label} ▼`;
            qualityDropdown.classList.remove('show');
        });
    });

    // Закрытие меню при клике вне его
    window.addEventListener('click', (e) => {
        if (!qualityBtn.contains(e.target) && !qualityDropdown.contains(e.target)) {
            qualityDropdown.classList.remove('show');
            qualityBtn.innerText = qualityBtn.innerText.replace('▲', '▼');
        }
    });

    let currentGifUrl = '';
    let isProcessing = false;

    toleranceSlider.addEventListener('input', (e) => tolValue.innerText = e.target.value);

    // 1. ЗАГРУЗКА И ПРЕДПРОСМОТР
    videoInput.addEventListener('change', (e) => {
        if (!e.target.files.length) return;
        
        const file = e.target.files[0];
        checkIcon.classList.add('visible');
        emptyText.style.display = 'none';
        finalGif.style.display = 'none';
        liveCanvas.style.display = 'block';
        btnDownload.style.display = 'none';
        btnProcess.style.display = 'block';
        processStatus.innerText = '';
        
        hiddenVideo.src = URL.createObjectURL(file);
        
        hiddenVideo.onloadedmetadata = () => {
            liveCanvas.width = hiddenVideo.videoWidth;
            liveCanvas.height = hiddenVideo.videoHeight;
            hiddenVideo.play();
            renderLivePreview(); 
        };
    });

    // Живой хромакей
    function renderLivePreview() {
        if (isProcessing) return; 
        if (!hiddenVideo.paused && !hiddenVideo.ended) {
            liveCtx.clearRect(0, 0, liveCanvas.width, liveCanvas.height);
            liveCtx.drawImage(hiddenVideo, 0, 0, liveCanvas.width, liveCanvas.height);
            let frame = liveCtx.getImageData(0, 0, liveCanvas.width, liveCanvas.height);
            
            let data = frame.data;
            let bgR = data[0], bgG = data[1], bgB = data[2];
            let tolerance = parseInt(toleranceSlider.value);

            for (let j = 0; j < data.length; j += 4) {
                let r = data[j], g = data[j+1], b = data[j+2];
                let diff = Math.sqrt(Math.pow(r - bgR, 2) + Math.pow(g - bgG, 2) + Math.pow(b - bgB, 2));
                if (diff < tolerance) {
                    data[j+3] = 0; 
                }
            }
            liveCtx.putImageData(frame, 0, 0);
        }
        requestAnimationFrame(renderLivePreview);
    }

    // 2. ОБРАБОТКА (Используем профессиональный gif.js)
    btnProcess.addEventListener('click', async () => {
        if (!videoInput.files.length) return alert('Сначала загрузите видео!');
        
        isProcessing = true;
        btnProcess.disabled = true;
        hiddenVideo.pause(); 
        liveCanvas.style.display = 'none';
        emptyText.style.display = 'inline';
        emptyText.innerText = 'Подготовка магии...';
        
        // Умное сжатие для обеспечения веса до 5 МБ
        const forceCompression = optQuality.classList.contains('active');
        
        let fps = 12; 
        if (selectedQualityWidth >= 600) fps = 8; 
        if (selectedQualityWidth >= 800) fps = 5; 
        if (!forceCompression) fps += 3; 
        
        let width = hiddenVideo.videoWidth;
        let height = hiddenVideo.videoHeight;
        
        if (width > selectedQualityWidth) {
            height = Math.floor(height * (selectedQualityWidth / width));
            width = selectedQualityWidth;
        }

        const processCanvas = document.getElementById('processCanvas');
        const pCtx = processCanvas.getContext('2d', { willReadFrequently: true });
        processCanvas.width = width;
        processCanvas.height = height;

        const duration = hiddenVideo.duration;
        let maxSeconds = (selectedQualityWidth >= 800) ? 4 : 7; 
        const totalFrames = Math.floor((duration > maxSeconds ? maxSeconds : duration) * fps); 

        const workerBlob = new Blob([`importScripts('https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.worker.js');`], { type: 'application/javascript' });
        const workerUrl = URL.createObjectURL(workerBlob);

        const gif = new GIF({
            workers: 2,
            quality: forceCompression ? 20 : 10,
            width: width,
            height: height,
            workerScript: workerUrl,
            transparent: 0xFF00FF 
        });

        processStatus.innerText = `Анализ пространства (0 / ${totalFrames})...`;

        for (let i = 0; i <= totalFrames; i++) {
            const time = i / fps;
            await seekVideo(hiddenVideo, time);
            
            pCtx.drawImage(hiddenVideo, 0, 0, width, height);
            let frameData = pCtx.getImageData(0, 0, width, height);
            let data = frameData.data;
            
            let bgR = data[0], bgG = data[1], bgB = data[2];
            let tolerance = parseInt(toleranceSlider.value);

            for (let j = 0; j < data.length; j += 4) {
                let r = data[j], g = data[j+1], b = data[j+2];
                let diff = Math.sqrt(Math.pow(r - bgR, 2) + Math.pow(g - bgG, 2) + Math.pow(b - bgB, 2));
                if (diff < tolerance) {
                    data[j] = 255;   
                    data[j+1] = 0;   
                    data[j+2] = 255; 
                    data[j+3] = 255; 
                }
            }
            pCtx.putImageData(frameData, 0, 0);
            
            gif.addFrame(pCtx, {copy: true, delay: 1000 / fps});
            processStatus.innerText = `Анализ пространства (${i} / ${totalFrames})...`;
        }

        gif.on('progress', function(p) {
            processStatus.innerText = 'Сборка артефакта: ' + Math.round(p * 100) + '%...';
        });

        gif.on('finished', function(blob) {
            currentGifUrl = URL.createObjectURL(blob);
            
            emptyText.style.display = 'none';
            finalGif.src = currentGifUrl;
            finalGif.style.display = 'block';
            
            btnProcess.style.display = 'none';
            btnDownload.style.display = 'block';
            
            let mbSize = (blob.size / (1024 * 1024)).toFixed(1);
            processStatus.innerText = `Готово! Вес: ~${mbSize} МБ. Скачайте и перетащите в Genially.`;
            processStatus.style.color = '#4ade80';
            
            btnProcess.disabled = false;
            isProcessing = false;
        });

        gif.render();
    });

    function seekVideo(video, time) {
        return new Promise((resolve) => {
            video.currentTime = time;
            video.addEventListener('seeked', function onSeeked() {
                video.removeEventListener('seeked', onSeeked);
                resolve();
            });
        });
    }

    // 3. СКАЧИВАНИЕ ФАЙЛА
    btnDownload.addEventListener('click', () => {
        const link = document.createElement('a');
        link.href = currentGifUrl;
        link.download = 'genially_transparent.gif';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        processStatus.innerText = 'Файл скачан! Теперь перетащите его в Genially.';
    });

</script>

</body>
</html>
